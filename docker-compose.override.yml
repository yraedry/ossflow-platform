# Dev override — cargado automáticamente por `docker compose`.
# Monta el código de ossflow-subtitle desde el host y activa --reload.
# El contenedor GPU ya tiene whisperx/torch instalados: no hay rebuild.
#
# Uso:
#   docker compose restart ossflow-subtitle   (primera vez)
#   # Después, cualquier cambio en ossflow-subtitle/ se recarga solo (<1s).
#
# Para producción (sin este override):
#   docker compose -f docker-compose.yml up -d

services:
  ossflow-subtitle:
    volumes:
      - ./ossflow-subtitle:/app/ossflow-subtitle
    command: >
      uvicorn app:app
        --host 0.0.0.0
        --port 8002
        --app-dir /app/ossflow-subtitle
        --reload
        --reload-dir /app/ossflow-subtitle
