# ============================================================
# OSSFlow Platform — Docker Compose
# ============================================================
# Levanta todo el backend: docker compose up -d
#
# Servicios:
#   - ossflow-api:        FastAPI gateway          → :8000
#   - ossflow-splitter:   Detector por señales (GPU) → :8001
#   - ossflow-subtitle:   WhisperX (GPU)           → :8002
#   - ossflow-dubbing:    ElevenLabs cloud TTS     → :8003
#   - ossflow-telegram:   Descarga de media        → :8004
#
# Ollama:
#   Vive en un LXC externo. Configurar OLLAMA_BASE_URL en .env
#   (ej. OLLAMA_BASE_URL=http://10.10.100.13:11434).
#
# Requiere:
#   - ossflow-base:latest construido desde el repo ossflow-core.
#   - ossflow-scrapper levantado en su propio compose si se usa el modo
#     scrapper (default). Conecta vía la network compartida ossflow_net.
# ============================================================

services:

  ossflow-api:
    build:
      context: .
      dockerfile: ./ossflow-api/Dockerfile
    container_name: ossflow-api
    ports:
      - "8000:8000"
    volumes:
      - config-data:/data/config
      - ossflow-db:/data/db
      - voice-profiles:/app/voice_profiles/samples
      - search-index:/app/search
      - nas-library:/media:rw
    environment:
      - PYTHONUNBUFFERED=1
      - CONFIG_DIR=/data/config
      - OSSFLOW_DB_PATH=/data/db/bjj.db
      - MEDIA_ROOT=/media
      - SPLITTER_URL=http://ossflow-splitter:8001
      - SCRAPPER_URL=http://ossflow-scrapper:8001
      - SUBS_URL=http://ossflow-subtitle:8002
      - DUBBING_URL=http://ossflow-dubbing:8003
      - TELEGRAM_FETCHER_URL=http://ossflow-telegram:8004
      # Ollama vive en un LXC externo. Configurar OLLAMA_BASE_URL en .env
      # (ej. OLLAMA_BASE_URL=http://10.10.100.13:11434).
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:?Define OLLAMA_BASE_URL en .env (host del Ollama externo)}
      - OLLAMA_URL=${OLLAMA_BASE_URL}
    depends_on:
      ossflow-splitter:
        condition: service_healthy
      ossflow-subtitle:
        condition: service_healthy
      ossflow-dubbing:
        condition: service_healthy
    networks:
      - ossflow_net
    privileged: true
    restart: unless-stopped

  ossflow-splitter:
    build:
      context: .
      dockerfile: ./ossflow-splitter/Dockerfile
    container_name: ossflow-splitter
    ports:
      - "8001:8001"
    volumes:
      - nas-library:/media:rw
      - hf-cache:/models/huggingface
      - torch-cache:/models/torch
      - model-cache:/models/cache
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - ossflow_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  ossflow-subtitle:
    build:
      context: .
      dockerfile: ./ossflow-subtitle/Dockerfile
    container_name: ossflow-subtitle
    ports:
      - "8002:8002"
    volumes:
      - nas-library:/media:rw
      - hf-cache:/models/huggingface
      - torch-cache:/models/torch
      - model-cache:/models/cache
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:?Define OLLAMA_BASE_URL en .env (host del Ollama externo)}
    networks:
      - ossflow_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  ossflow-dubbing:
    build:
      context: .
      dockerfile: ./ossflow-dubbing/Dockerfile
    container_name: ossflow-dubbing
    # Forzar runtime nvidia. ``deploy.resources.reservations.devices``
    # solo lo respeta Docker Swarm; en Compose standalone se ignora,
    # el container arranca con ``runc`` y nvidia-container-toolkit
    # NO inyecta el manifest /usr/share/vulkan/icd.d/nvidia_icd.json
    # (sin él vulkaninfo solo ve llvmpipe y s2.cpp cae a CPU).
    # Requiere ``"runtimes": {"nvidia": {...}}`` en /etc/docker/daemon.json
    # y nvidia-container-toolkit instalado en el host (LXC).
    runtime: nvidia
    ports:
      - "8003:8003"
    volumes:
      - nas-library:/media:rw
      - hf-cache:/models/huggingface
      - torch-cache:/models/torch
      - model-cache:/models/cache
      - ./ossflow-dubbing/voices:/voices:rw
      - ${S2PRO_MODEL_DIR:-./models/s2pro-gguf}:/models/s2pro:ro
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      # `graphics` is required so nvidia-container-toolkit injects the
      # NVIDIA Vulkan ICD (manifest + libGLX_nvidia + libnvidia-glcore)
      # into the container. Without it, vulkaninfo only sees llvmpipe and
      # s2.cpp falls back to CPU. See ossflow-dubbing/Dockerfile for the
      # rationale on Vulkan over CUDA.
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - TORCH_HOME=/models/torch
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/cache
      - DUBBING_MODEL_VOICE_PATH=${DUBBING_MODEL_VOICE_PATH:-}
      # S2-Pro es el único motor TTS soportado tras T22.5 (eliminados
      # ElevenLabs/Piper/Kokoro). La cuantización se controla desde la
      # UI vía el setting ``s2_quantization``: el frontend descubre los
      # GGUF disponibles llamando a ``GET /api/dubbing/s2pro/models``,
      # que escanea este bind-mount en caliente. Para añadir variantes
      # basta con dejar un fichero ``s2-pro-<quant>.gguf`` en la carpeta
      # del host (``S2PRO_MODEL_DIR``) y recargar la UI.
      # El env var de abajo actúa solo como fallback inicial cuando aún
      # no hay setting persistido en BD; en runtime el path real se
      # construye en pipeline.py como ``/models/s2pro/s2-pro-{quant}.gguf``.
      - S2PRO_GGUF_PATH=${S2PRO_GGUF_PATH:-/models/s2pro/s2-pro-q6_k.gguf}
      - S2PRO_TOKENIZER_PATH=${S2PRO_TOKENIZER_PATH:-/models/s2pro/tokenizer.json}
    networks:
      - ossflow_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility, graphics]
    restart: unless-stopped

  ossflow-telegram:
    build:
      context: .
      dockerfile: ./ossflow-telegram/Dockerfile
    container_name: ossflow-telegram
    ports:
      - "8004:8004"
    volumes:
      - tg-session:/data/session
      - tg-cache:/data/cache
      - ossflow-db:/data/db
      - nas-library:/media:rw
    environment:
      - PYTHONUNBUFFERED=1
      - PROCESSOR_API_URL=http://ossflow-api:8000
      - OSSFLOW_DB_PATH=/data/db/bjj.db
    networks:
      - ossflow_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  config-data:
  ossflow-db:
  voice-profiles:
  search-index:
  hf-cache:
  torch-cache:
  model-cache:
  tg-session:
  tg-cache:
  nas-library:
    driver: local
    driver_opts:
      type: ${NAS_VOLUME_TYPE:-cifs}
      device: ${NAS_VOLUME_DEVICE:-//${NAS_HOST}/${NAS_SHARE}}
      o: ${NAS_VOLUME_OPTS:-username=${NAS_USER},password=${NAS_PASS},uid=0,gid=0,vers=3.0,cache=strict,iocharset=utf8}

networks:
  ossflow_net:
    name: ossflow_net
    driver: bridge
